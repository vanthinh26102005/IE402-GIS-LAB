<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BTTH1 GeoJSON Viewer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin=""
  >
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="layout">
    <aside class="panel">
      <div class="hero">
        <span class="eyebrow">BTTH1 GIS Viewer</span>
        <h1>Phân tách dữ liệu theo bài</h1>
        <p id="summary" class="summary">Đang tải danh sách lớp dữ liệu...</p>
      </div>

      <div class="filter-bar">
        <button class="filter-btn is-active" type="button" data-filter="all">Tất cả</button>
        <button class="filter-btn" type="button" data-filter="province">Tỉnh</button>
        <button class="filter-btn" type="button" data-filter="road">Đường</button>
        <button class="filter-btn" type="button" data-filter="school">Trường</button>
      </div>

      <div class="actions">
        <button id="show-visible" class="action-btn" type="button">Bật nhóm đang lọc</button>
        <button id="hide-visible" class="action-btn secondary" type="button">Tắt nhóm đang lọc</button>
      </div>

      <div id="sections" class="sections"></div>

      <div class="hero">
        <!-- <p class="hint">Mở bằng `Live Server` hoặc chạy `python3 -m http.server` để trang đọc được các file `GeoJSON` bằng `fetch()`.</p> -->
      </div>
    </aside>

    <section class="map-shell">
      <div id="map"></div>
      <div class="legend">
        <p class="legend-title">Nhóm Dữ Liệu</p>
        <div class="legend-item">
          <span class="legend-swatch" style="background: var(--province);"></span>
          <span>Bài 1: Tỉnh</span>
        </div>
        <div class="legend-item">
          <span class="legend-swatch" style="background: var(--road);"></span>
          <span>Bài 2: Đường</span>
        </div>
        <div class="legend-item">
          <span class="legend-swatch" style="background: var(--school);"></span>
          <span>Bài 3: Trường</span>
        </div>
      </div>
    </section>
  </main>

  <script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
    crossorigin=""
  ></script>
  <script src="https://unpkg.com/esri-leaflet@3.0.14/dist/esri-leaflet.js"></script>
  <script>
    const groups = [
      {
        id: 'bai1',
        title: 'Bài 1',
        subtitle: 'Tỉnh',
        category: 'province',
        color: '#14532d',
        files: [
          { path: 'bai_1_ve_tinh/nam_bo.geojson' }
        ]
      },
      {
        id: 'bai2',
        title: 'Bài 2',
        subtitle: 'Đường',
        category: 'road',
        color: '#b45309',
        files: [
          { path: 'bai_2_ve_duong/ct_01.geojson' },
          { path: 'bai_2_ve_duong/ct_28.geojson' },
          { path: 'bai_2_ve_duong/ct_29.geojson' },
          { path: 'bai_2_ve_duong/ct_40.geojson' },
          { path: 'bai_2_ve_duong/ql_13.geojson' },
          { path: 'bai_2_ve_duong/ql_22b.geojson' },
          { path: 'bai_2_ve_duong/ql_56.geojson' },
          { path: 'bai_2_ve_duong/ql_57.geojson' },
          { path: 'bai_2_ve_duong/ql_22.geojson' },
          { path: 'bai_2_ve_duong/ql_50.geojson' },
          { path: 'bai_2_ve_duong/ql_51.geojson' },
          { path: 'bai_2_ve_duong/ql_55.geojson' },
          { path: 'bai_2_ve_duong/ql_62.geojson' },
          { path: 'bai_2_ve_duong/ql_60.geojson' }
        ]
      },
      {
        id: 'bai3',
        title: 'Bài 3',
        subtitle: 'Trường',
        category: 'school',
        color: '#1d4ed8',
        files: [
          { path: 'bai_3_ve_truong/dg_ca_mau.geojson' },
          { path: 'bai_3_ve_truong/dh_an_giang.geojson' },
          { path: 'bai_3_ve_truong/dh_brvt_cs_1_2_3.geojson' },
          { path: 'bai_3_ve_truong/dh_brvt.geojson' },
          { path: 'bai_3_ve_truong/dh_bac_lieu.geojson' },
          { path: 'bai_3_ve_truong/dh_cn.geojson' },
          { path: 'bai_3_ve_truong/dh_cntt.geojson' },
          { path: 'bai_3_ve_truong/dh_dong_thap.geojson' },
          { path: 'bai_3_ve_truong/dh_kg.geojson' },
          { path: 'bai_3_ve_truong/dh_spkt.geojson' },
          { path: 'bai_3_ve_truong/dh_td.geojson' },
          { path: 'bai_3_ve_truong/dh_tdm.geojson' },
          { path: 'bai_3_ve_truong/dh_tg.geojson' },
          { path: 'bai_3_ve_truong/dh_travinh.geojson' },
          { path: 'bai_3_ve_truong/dh_vinhlong.geojson' }
        ]
      }
    ];

    const roadPalette = [
      '#c5661a', '#0f766e', '#2563eb', '#be123c', '#7c3aed', '#4d7c0f',
      '#0f766e', '#b45309', '#0369a1', '#a21caf', '#15803d', '#c2410c',
      '#1d4ed8', '#b91c1c'
    ];

    const map = L.map('map', {
      preferCanvas: true,
      zoomControl: true,
      minZoom: 4
    }).setView([10.6, 106.3], 8);

    const vietnamBorderLngLat = [
      [108.05018, 21.55238], [106.715068, 20.696851], [105.881682, 19.75205], [105.662006, 19.058165],
      [106.426817, 18.004121], [107.361954, 16.697457], [108.269495, 16.079742], [108.877107, 15.276691],
      [109.33527, 13.426028], [109.200136, 11.666859], [108.36613, 11.008321], [107.220929, 10.364484],
      [106.405113, 9.53084], [105.158264, 8.59976], [104.795185, 9.241038], [105.076202, 9.918491],
      [104.334335, 10.486544], [105.199915, 10.88931], [106.24967, 10.961812], [105.810524, 11.567615],
      [107.491403, 12.337206], [107.614548, 13.535531], [107.382727, 14.202441], [107.564525, 15.202173],
      [107.312706, 15.908538], [106.556008, 16.604284], [105.925762, 17.485315], [105.094598, 18.666975],
      [103.896532, 19.265181], [104.183388, 19.624668], [104.822574, 19.886642], [104.435, 20.758733],
      [103.203861, 20.766562], [102.754896, 21.675137], [102.170436, 22.464753], [102.706992, 22.708795],
      [103.504515, 22.703757], [104.476858, 22.81915], [105.329209, 23.352063], [105.811247, 22.976892],
      [106.725403, 22.794268], [106.567273, 22.218205], [107.04342, 21.811899], [108.05018, 21.55238]
    ];
    const vietnamBorderLatLng = vietnamBorderLngLat.map(([lng, lat]) => [lat, lng]);
    const vietnamBounds = L.latLngBounds(vietnamBorderLatLng);
    map.fitBounds(vietnamBounds.pad(0.03));
    map.setMaxBounds(vietnamBounds.pad(0.15));
    map.options.maxBoundsViscosity = 1.0;

    map.createPane('country-mask-pane');
    const countryMaskPane = map.getPane('country-mask-pane');
    countryMaskPane.style.zIndex = '350';
    countryMaskPane.style.pointerEvents = 'none';

    const worldMaskLatLng = [
      [90, -180], [90, 180], [-90, 180], [-90, -180]
    ];
    L.polygon([worldMaskLatLng, vietnamBorderLatLng], {
      pane: 'country-mask-pane',
      stroke: false,
      fillColor: '#f8fafc',
      fillOpacity: 0.92,
      interactive: false
    }).addTo(map);
    L.polyline(vietnamBorderLatLng, {
      pane: 'country-mask-pane',
      color: '#475569',
      weight: 1.2,
      opacity: 0.8,
      interactive: false
    }).addTo(map);

    const osmBasemap = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      maxZoom: 19,
      detectRetina: true,
      noWrap: true,
      attribution: '&copy; OpenStreetMap contributors'
    });
    osmBasemap.addTo(map);

    const imageryBasemap = L.esri.basemapLayer('Imagery', {
      detectRetina: true,
      noWrap: true
    });
    const imageryLabels = L.esri.basemapLayer('ImageryLabels', {
      noWrap: true
    });
    const imageryWithLabels = L.layerGroup([imageryBasemap, imageryLabels]);

    L.control.layers(
      {
        'OSM (giống geojson.io)': osmBasemap,
        'Esri Imagery + Labels': imageryWithLabels
      },
      null,
      { collapsed: false }
    ).addTo(map);

    const sectionsEl = document.getElementById('sections');
    const summaryEl = document.getElementById('summary');
    const filterButtons = Array.from(document.querySelectorAll('.filter-btn'));

    let activeFilter = 'all';
    const sectionRegistry = [];
    const layerRegistry = [];

    function escapeHtml(value) {
      return String(value)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#39;');
    }

    function getGeometryType(data) {
      const feature = Array.isArray(data.features) ? data.features[0] : null;
      return feature && feature.geometry ? feature.geometry.type : 'Unknown';
    }

    function buildPopup(properties) {
      const entries = Object.entries(properties || {}).filter(([key, value]) => {
        return key !== 'Logo' && value !== null && value !== '';
      });
      if (!entries.length) {
        return '<p>Không có thuộc tính.</p>';
      }

      const rows = entries.map(([key, value]) => {
        return `<tr><th>${escapeHtml(key)}</th><td>${escapeHtml(value)}</td></tr>`;
      }).join('');

      return `<table class="popup-table">${rows}</table>`;
    }

    function buildSidebarInfo(entry) {
      const entries = Object.entries(entry.previewProperties || {}).filter(([key, value]) => {
        return key !== 'Logo' && value !== null && value !== '';
      });
      if (!entries.length) {
        return '<p class="layer-info-note">Không có thuộc tính để hiển thị.</p>';
      }

      const rows = entries.map(([key, value]) => {
        return `<tr><th>${escapeHtml(key)}</th><td>${escapeHtml(value)}</td></tr>`;
      }).join('');

      const note = entry.featureCount > 1
        ? '<p class="layer-info-note">Thông tin bên dưới là mẫu từ đối tượng đầu tiên của lớp này.</p>'
        : '';

      return `
        <p class="layer-info-title">Thông tin nhanh</p>
        ${note}
        <table class="popup-table sidebar-table">${rows}</table>
      `;
    }

    function getLayerColor(group, fileIndex) {
      if (group.category === 'road') {
        return roadPalette[fileIndex % roadPalette.length];
      }
      return group.color;
    }

    function getLayerLabel(group, previewProperties, file, featureCount) {
      if (group.category === 'province') {
        return `${featureCount} tỉnh Nam Bộ`;
      }

      return previewProperties['Tên tuyến hiển thị']
        || previewProperties['Tên tỉnh']
        || previewProperties['Tên trường']
        || previewProperties['TenTruong']
        || file.path.split('/').pop().replace(/\.geojson$/i, '');
    }

    function createSchoolIcon(logo, label) {
      return L.divIcon({
        className: 'school-logo-marker',
        html: `
          <div class="school-logo-badge">
            <img src="${logo}" alt="${escapeHtml(label || 'Logo trường')}">
          </div>
        `,
        iconSize: [38, 38],
        iconAnchor: [19, 19],
        popupAnchor: [0, -18]
      });
    }

    function styleFor(color, geometryType, category = '') {
      if (geometryType.includes('Polygon')) {
        const isProvince = category === 'province';
        return {
          color,
          weight: isProvince ? 2.4 : 2,
          fillColor: color,
          fillOpacity: isProvince ? 0.42 : 0.18
        };
      }

      return {
        color,
        weight: 3,
        opacity: 0.9
      };
    }

    function createSchoolLogoLayer(data) {
      const iconLayer = L.layerGroup();

      for (const feature of data.features || []) {
        const properties = feature.properties || {};
        const geometryType = feature.geometry?.type || '';
        if (!properties.Logo || !geometryType.includes('Polygon')) {
          continue;
        }

        const tempLayer = L.geoJSON(feature);
        const bounds = tempLayer.getBounds();
        if (!bounds.isValid()) {
          continue;
        }

        const center = bounds.getCenter();
        const marker = L.marker(center, {
          icon: createSchoolIcon(properties.Logo, properties['Tên trường'])
        });
        marker.bindPopup(buildPopup(properties));
        iconLayer.addLayer(marker);
      }

      return iconLayer.getLayers().length ? iconLayer : null;
    }

    function makeSection(group) {
      const section = document.createElement('section');
      section.className = 'section';
      section.dataset.category = group.category;
      section.dataset.groupId = group.id;

      const header = document.createElement('div');
      header.className = 'section-header';

      const left = document.createElement('div');
      const title = document.createElement('p');
      title.className = 'section-title';
      title.textContent = `${group.title} - ${group.subtitle}`;

      const meta = document.createElement('p');
      meta.className = 'section-meta';
      meta.textContent = `${group.files.length} file GeoJSON`;

      left.append(title, meta);

      const badge = document.createElement('span');
      badge.className = 'section-badge';
      badge.dataset.category = group.category;
      badge.textContent = group.subtitle;

      header.append(left, badge);

      const list = document.createElement('div');
      list.className = 'layer-list';

      section.append(header, list);
      sectionsEl.appendChild(section);

      const sectionEntry = { group, sectionEl: section, listEl: list };
      sectionRegistry.push(sectionEntry);
      return sectionEntry;
    }

    function addLayerCard(sectionEntry, layerEntry) {
      const item = document.createElement('article');
      item.className = 'layer-item';
      item.dataset.category = layerEntry.group.category;

      const toggle = document.createElement('input');
      toggle.type = 'checkbox';
      toggle.className = 'layer-toggle';
      toggle.checked = true;

      const body = document.createElement('div');

      const name = document.createElement('p');
      name.className = 'layer-name';
      name.textContent = layerEntry.label;

      const path = document.createElement('p');
      path.className = 'layer-path';
      path.textContent = layerEntry.path;

      const meta = document.createElement('p');
      meta.className = 'layer-meta-detail';
      meta.textContent = `${layerEntry.featureCount} đối tượng | ${layerEntry.geometryType}`;

      body.append(name, path, meta);

      const tools = document.createElement('div');
      tools.className = 'layer-tools';

      const swatch = document.createElement('span');
      swatch.className = 'swatch';
      swatch.style.backgroundColor = layerEntry.color;

      const zoomBtn = document.createElement('button');
      zoomBtn.type = 'button';
      zoomBtn.className = 'tool-btn zoom-btn';
      zoomBtn.textContent = 'Zoom';
      zoomBtn.addEventListener('click', () => {
        if (layerEntry.bounds && layerEntry.bounds.isValid()) {
          map.fitBounds(layerEntry.bounds, { padding: [28, 28] });
        }
      });

      tools.append(swatch);
      if (layerEntry.group.category !== 'province') {
        const infoBtn = document.createElement('button');
        infoBtn.type = 'button';
        infoBtn.className = 'tool-btn info-btn';
        infoBtn.textContent = 'i';
        infoBtn.title = 'Xem thông tin nhanh';

        const infoPanel = document.createElement('div');
        infoPanel.className = 'layer-info hidden';
        infoPanel.innerHTML = buildSidebarInfo(layerEntry);

        infoBtn.addEventListener('click', () => {
          const willOpen = infoPanel.classList.contains('hidden');
          infoPanel.classList.toggle('hidden', !willOpen);
          infoBtn.classList.toggle('is-open', willOpen);
        });

        tools.append(infoBtn);
        item.appendChild(infoPanel);
      }
      tools.append(zoomBtn);
      item.append(toggle, body, tools);
      sectionEntry.listEl.appendChild(item);

      toggle.addEventListener('change', () => {
        if (toggle.checked) {
          layerEntry.layer.addTo(map);
          if (layerEntry.iconLayer) {
            layerEntry.iconLayer.addTo(map);
          }
        } else {
          map.removeLayer(layerEntry.layer);
          if (layerEntry.iconLayer) {
            map.removeLayer(layerEntry.iconLayer);
          }
        }
        fitVisibleBounds();
        updateSummary();
      });

      layerEntry.toggle = toggle;
      layerEntry.cardEl = item;
    }

    function fitVisibleBounds() {
      const bounds = L.latLngBounds([]);
      layerRegistry.forEach((entry) => {
        if (entry.toggle && entry.toggle.checked && entry.bounds && entry.bounds.isValid()) {
          bounds.extend(entry.bounds);
        }
      });

      if (bounds.isValid()) {
        map.fitBounds(bounds, { padding: [30, 30] });
      }
    }

    function updateSummary() {
      const visibleOnMap = layerRegistry.filter((entry) => entry.toggle && entry.toggle.checked).length;
      const visibleInFilter = layerRegistry.filter((entry) => {
        return activeFilter === 'all' || entry.group.category === activeFilter;
      }).length;
      summaryEl.textContent = `${layerRegistry.length} lớp đã tải. Đang lọc ${visibleInFilter} lớp, hiển thị trên bản đồ ${visibleOnMap} lớp.`;
    }

    function applyFilter(filter) {
      activeFilter = filter;

      filterButtons.forEach((button) => {
        button.classList.toggle('is-active', button.dataset.filter === filter);
      });

      sectionRegistry.forEach((entry) => {
        const matches = filter === 'all' || entry.group.category === filter;
        entry.sectionEl.classList.toggle('hidden', !matches);
      });

      updateSummary();
    }

    async function loadLayer(group, file, sectionEntry, fileIndex) {
      const response = await fetch(encodeURI(file.path));
      if (!response.ok) {
        throw new Error(`${file.path}: HTTP ${response.status}`);
      }

      const data = await response.json();
      const geometryType = getGeometryType(data);
      const color = getLayerColor(group, fileIndex);
      const previewProperties = Array.isArray(data.features) && data.features.length
        ? (data.features[0].properties || {})
        : {};
      const label = getLayerLabel(
        group,
        previewProperties,
        file,
        Array.isArray(data.features) ? data.features.length : 0
      );
      const layer = L.geoJSON(data, {
        style: styleFor(color, geometryType, group.category),
        pointToLayer(feature, latlng) {
          if (group.category === 'school' && feature.properties && feature.properties.Logo) {
            return L.marker(latlng, {
              icon: createSchoolIcon(feature.properties.Logo, feature.properties['Tên trường'])
            });
          }
          return L.circleMarker(latlng, {
            radius: 7,
            color: '#ffffff',
            weight: 2,
            fillColor: color,
            fillOpacity: 0.95
          });
        },
        onEachFeature(feature, featureLayer) {
          featureLayer.bindPopup(buildPopup(feature.properties));
        }
      }).addTo(map);

      let iconLayer = null;
      if (group.category === 'school') {
        iconLayer = createSchoolLogoLayer(data);
        if (iconLayer) {
          iconLayer.addTo(map);
        }
      }

      const bounds = layer.getBounds();
      const entry = {
        group,
        path: file.path,
        label,
        color,
        geometryType,
        featureCount: Array.isArray(data.features) ? data.features.length : 0,
        previewProperties,
        layer,
        iconLayer,
        bounds
      };

      layerRegistry.push(entry);
      addLayerCard(sectionEntry, entry);
    }

    async function bootstrap() {
      const errors = [];

      for (const group of groups) {
        const sectionEntry = makeSection(group);
        for (const [fileIndex, file] of group.files.entries()) {
          try {
            await loadLayer(group, file, sectionEntry, fileIndex);
          } catch (error) {
            errors.push(error.message);
          }
        }
      }

      fitVisibleBounds();
      updateSummary();

      if (errors.length) {
        const errorBox = document.createElement('section');
        errorBox.className = 'section';
        errorBox.innerHTML = `
          <div class="section-header">
            <div>
              <p class="section-title">Có file tải thất bại</p>
              <p class="section-meta">${escapeHtml(errors.join(' | '))}</p>
            </div>
          </div>
        `;
        sectionsEl.prepend(errorBox);
      }
    }

    filterButtons.forEach((button) => {
      button.addEventListener('click', () => applyFilter(button.dataset.filter));
    });

    document.getElementById('show-visible').addEventListener('click', () => {
      layerRegistry.forEach((entry) => {
        if (activeFilter === 'all' || entry.group.category === activeFilter) {
          entry.toggle.checked = true;
          entry.layer.addTo(map);
          if (entry.iconLayer) {
            entry.iconLayer.addTo(map);
          }
        }
      });
      fitVisibleBounds();
      updateSummary();
    });

    document.getElementById('hide-visible').addEventListener('click', () => {
      layerRegistry.forEach((entry) => {
        if (activeFilter === 'all' || entry.group.category === activeFilter) {
          entry.toggle.checked = false;
          map.removeLayer(entry.layer);
          if (entry.iconLayer) {
            map.removeLayer(entry.iconLayer);
          }
        }
      });
      fitVisibleBounds();
      updateSummary();
    });

    bootstrap();
  </script>
</body>
</html>
