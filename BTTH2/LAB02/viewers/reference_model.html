<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Nhà hát Thành phố - Model tham chiếu</title>
  <style>
    :root {
      --panel: rgba(20, 24, 31, 0.9);
      --ink: #f8fafc;
      --muted: #b8c4d2;
      --accent: #d89245;
      --line: rgba(255, 255, 255, 0.14);
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      color: var(--ink);
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      background: #111827;
    }

    #canvasWrap {
      width: 100%;
      height: 100%;
    }

    #panel {
      position: absolute;
      top: 14px;
      left: 14px;
      z-index: 10;
      width: min(390px, calc(100% - 28px));
      padding: 14px 16px;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: var(--panel);
      box-shadow: 0 12px 26px rgba(0, 0, 0, 0.28);
      backdrop-filter: blur(8px);
    }

    h1 {
      margin: 0 0 8px;
      font-size: 18px;
      line-height: 1.25;
    }

    p {
      margin: 0 0 10px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
    }

    .row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 10px;
    }

    .viewer-tabs {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 6px;
      margin-bottom: 10px;
    }

    .viewer-tabs a {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 30px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.08);
      color: var(--ink);
      font-size: 12px;
      font-weight: 700;
      text-align: center;
      text-decoration: none;
    }

    .viewer-tabs a:hover {
      border-color: rgba(216, 146, 69, 0.75);
      background: rgba(216, 146, 69, 0.22);
    }

    .viewer-tabs a.is-active {
      border-color: rgba(216, 146, 69, 0.9);
      background: rgba(216, 146, 69, 0.36);
    }

    button {
      min-height: 34px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 7px 10px;
      background: rgba(255, 255, 255, 0.08);
      color: var(--ink);
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
    }

    button:hover {
      border-color: rgba(216, 146, 69, 0.75);
      background: rgba(216, 146, 69, 0.22);
    }

    button.is-active {
      border-color: rgba(216, 146, 69, 0.9);
      background: rgba(216, 146, 69, 0.36);
    }

    #status {
      color: #dbeafe;
      font-size: 12px;
      line-height: 1.45;
      white-space: pre-line;
    }

    canvas {
      display: block;
    }
  </style>
</head>
<body>
  <div id="panel">
    <h1>Model tham chiếu - Nhà hát Thành phố</h1>
    <nav class="viewer-tabs" aria-label="Chuyen trang viewer">
      <a href="../index.html">ArcGIS chính</a>
      <a href="geojson_layer_check.html">GeoJSON</a>
      <a href="gltf_lod3_check.html">glTF LoD3</a>
      <a class="is-active" href="reference_model.html">Model tham chiếu</a>
    </nav>
    <div class="row">
      <button id="fitBtn" type="button">Fit Model</button>
      <button id="orbitBtn" type="button">Auto Orbit</button>
      <button id="wireBtn" type="button">Wireframe</button>
    </div>
    <div id="status">Đang tải model...</div>
  </div>
  <div id="canvasWrap"></div>

  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.167.1/build/three.module.js"
      }
    }
  </script>

  <script type="module">
    const wrap = document.getElementById("canvasWrap");
    const statusEl = document.getElementById("status");
    const fitBtn = document.getElementById("fitBtn");
    const orbitBtn = document.getElementById("orbitBtn");
    const wireBtn = document.getElementById("wireBtn");

    function updateStatus(message) {
      statusEl.textContent = message;
    }

    async function importFrom(urls) {
      let lastError = null;
      for (const url of urls) {
        try {
          return await import(url);
        } catch (err) {
          lastError = err;
        }
      }
      throw lastError;
    }

    function buildModelCandidates(relativePath) {
      const dataPath = relativePath.replace(/^\.\.\//, "");
      return [...new Set([
        new URL(relativePath, window.location.href).href,
        new URL(dataPath, `${window.location.origin}/`).href,
        new URL(`BTTH2/LAB02/${dataPath}`, `${window.location.origin}/`).href
      ])];
    }

    async function resolveModelUrl(urls) {
      let lastError = null;
      for (const url of urls) {
        try {
          const response = await fetch(url, { method: "HEAD", cache: "no-store" });
          if (response.ok) return url;
          lastError = new Error(`${response.status} ${response.statusText}: ${url}`);
        } catch (err) {
          lastError = err;
        }
      }
      throw lastError;
    }

    let THREE;
    let OrbitControls;
    let GLTFLoader;
    try {
      const [threeMod, controlsMod, loaderMod] = await Promise.all([
        importFrom([
          "https://esm.sh/three@0.167.1",
          "https://cdn.jsdelivr.net/npm/three@0.167.1/build/three.module.js"
        ]),
        importFrom([
          "https://esm.sh/three@0.167.1/examples/jsm/controls/OrbitControls.js",
          "https://cdn.jsdelivr.net/npm/three@0.167.1/examples/jsm/controls/OrbitControls.js"
        ]),
        importFrom([
          "https://esm.sh/three@0.167.1/examples/jsm/loaders/GLTFLoader.js",
          "https://cdn.jsdelivr.net/npm/three@0.167.1/examples/jsm/loaders/GLTFLoader.js"
        ])
      ]);
      THREE = threeMod;
      OrbitControls = controlsMod.OrbitControls;
      GLTFLoader = loaderMod.GLTFLoader;
    } catch (err) {
      updateStatus("Không tải được thư viện Three.js từ CDN.\n" + String(err));
      throw err;
    }

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x111827);

    const camera = new THREE.PerspectiveCamera(52, window.innerWidth / window.innerHeight, 0.1, 5000);
    camera.position.set(85, 48, 95);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    wrap.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.target.set(0, 14, 0);

    scene.add(new THREE.HemisphereLight(0xffffff, 0x445066, 1.8));

    const keyLight = new THREE.DirectionalLight(0xffffff, 2.1);
    keyLight.position.set(70, 90, 95);
    scene.add(keyLight);

    const fillLight = new THREE.DirectionalLight(0xffe2b6, 0.75);
    fillLight.position.set(-80, 55, -60);
    scene.add(fillLight);

    const grid = new THREE.GridHelper(120, 24, 0x5f6b7a, 0x2d3746);
    scene.add(grid);

    let modelRoot = null;
    let bbox = null;
    let wireframeOn = false;
    let autoOrbit = false;

    function fitCameraToModel() {
      if (!bbox) return;
      const size = bbox.getSize(new THREE.Vector3());
      const center = bbox.getCenter(new THREE.Vector3());
      const maxDim = Math.max(size.x, size.y, size.z);
      const distance = maxDim * 1.35;

      camera.position.set(center.x + distance, center.y + distance * 0.55, center.z + distance);
      camera.near = Math.max(0.01, maxDim / 1000);
      camera.far = Math.max(1000, maxDim * 80);
      camera.updateProjectionMatrix();

      controls.target.copy(center);
      controls.update();
    }

    const loader = new GLTFLoader();
    const modelCandidates = buildModelCandidates("../data/model/reference/nhahat_reference.glb");
    let modelUrl = "";
    try {
      modelUrl = await resolveModelUrl(modelCandidates);
    } catch (err) {
      updateStatus(
        "Không tìm thấy file model. Hãy chạy bằng local server và mở qua http://localhost.\n" +
        "Các đường dẫn đã thử:\n" +
        modelCandidates.join("\n") +
        "\n" +
        String(err)
      );
      throw err;
    }

    loader.load(
      modelUrl,
      (gltf) => {
        modelRoot = gltf.scene;

        const rawBox = new THREE.Box3().setFromObject(modelRoot);
        const rawSize = rawBox.getSize(new THREE.Vector3());
        const rawCenter = rawBox.getCenter(new THREE.Vector3());
        const rawMax = Math.max(rawSize.x, rawSize.y, rawSize.z);
        const scale = rawMax > 0 ? 82 / rawMax : 1;

        modelRoot.scale.setScalar(scale);
        modelRoot.position.set(-rawCenter.x * scale, -rawCenter.y * scale, -rawCenter.z * scale);
        scene.add(modelRoot);

        bbox = new THREE.Box3().setFromObject(modelRoot);
        const size = bbox.getSize(new THREE.Vector3());

        let vertices = 0;
        let triangles = 0;
        modelRoot.traverse((obj) => {
          if (obj.isMesh && obj.geometry) {
            const pos = obj.geometry.getAttribute("position");
            if (pos) vertices += pos.count;
            if (obj.geometry.index) triangles += obj.geometry.index.count / 3;
            else if (pos) triangles += pos.count / 3;
          }
        });

        fitCameraToModel();
        updateStatus(
          "Loaded OK\n" +
          `File: ${modelUrl}\n` +
          `Raw bbox: ${rawSize.x.toFixed(1)} x ${rawSize.y.toFixed(1)} x ${rawSize.z.toFixed(1)}\n` +
          `Viewer bbox: ${size.x.toFixed(1)} x ${size.y.toFixed(1)} x ${size.z.toFixed(1)}\n` +
          `Vertices: ${vertices.toLocaleString()} | Triangles: ${Math.round(triangles).toLocaleString()}`
        );
      },
      undefined,
      (err) => {
        updateStatus(
          "Không tải được model. Hãy mở qua local server, không mở file trực tiếp.\n" +
          `Đường dẫn đang dùng: ${modelUrl}\n` +
          String(err)
        );
      }
    );

    fitBtn.addEventListener("click", fitCameraToModel);

    wireBtn.addEventListener("click", () => {
      wireframeOn = !wireframeOn;
      wireBtn.classList.toggle("is-active", wireframeOn);
      if (!modelRoot) return;
      modelRoot.traverse((obj) => {
        if (obj.isMesh && obj.material) {
          const materials = Array.isArray(obj.material) ? obj.material : [obj.material];
          materials.forEach((material) => {
            material.wireframe = wireframeOn;
            material.needsUpdate = true;
          });
        }
      });
    });

    orbitBtn.addEventListener("click", () => {
      autoOrbit = !autoOrbit;
      orbitBtn.classList.toggle("is-active", autoOrbit);
      orbitBtn.textContent = autoOrbit ? "Stop Orbit" : "Auto Orbit";
    });

    controls.addEventListener("start", () => {
      if (autoOrbit) {
        autoOrbit = false;
        orbitBtn.classList.remove("is-active");
        orbitBtn.textContent = "Auto Orbit";
      }
    });

    window.addEventListener("resize", () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    function animate() {
      if (autoOrbit && bbox) {
        const center = bbox.getCenter(new THREE.Vector3());
        const radius = camera.position.distanceTo(center);
        const angle = performance.now() * 0.00018;
        camera.position.x = center.x + Math.cos(angle) * radius;
        camera.position.z = center.z + Math.sin(angle) * radius;
        camera.lookAt(center);
      }
      controls.update();
      renderer.render(scene, camera);
      requestAnimationFrame(animate);
    }

    animate();
  </script>
</body>
</html>
